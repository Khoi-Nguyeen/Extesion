<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Máy tính AI v3.6</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; max-width: 520px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; font-size: 14px; }
    button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
    #result { margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Máy tính AI v3.6</h1>

  <div class="row">
    <input id="numInput" type="number" placeholder="Nhập số..." />
    <button id="calcBtn" type="button">Tính</button>
  </div>

  <div id="result">Kết quả: (chưa tính)</div>

  <script src="popup.js"></script>
</body>
</html>
